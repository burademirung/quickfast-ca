site:
  name: 'QuickFast Service Company'
  site: 'https://quickfast.ca'
  base: '/'
  trailingSlash: true

# Default SEO metadata
metadata:
  title:
    default: 'QuickFast Service Company — HVAC, Plumbing, Electrical & Renovations | Mississauga'
    template: '%s | QuickFast Service Company'
  description: "QuickFast Service Company — HVAC, plumbing, electrical, duct cleaning + renovations across Mississauga and the GTA. 15+ years, ESA-certified, 24/7 emergency."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: 'QuickFast Service Company'
    images:
      - url: '~/assets/images/og-image.png'
        width: 1200
        height: 630
    type: website
  twitter:
    handle: '@quickfastca'
    site: '@quickfastca'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

# AstroWind ships with apps.blog for static blog. We replaced it with a Cloudflare
# Pages Function (functions/blog/[slug].ts) that reads from KV. Disabled here.
apps:
  blog:
    isEnabled: false

analytics:
  vendors:
    googleAnalytics:
      id: null
      partytown: false

ui:
  theme: 'light:only'
